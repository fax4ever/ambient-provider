apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ambient-provider.fullname" . }}-nginx-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ambient-provider.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

        access_log /dev/stdout main;

        sendfile on;
        tcp_nopush on;
        keepalive_timeout 65;
        gzip on;

        # Use /tmp for all temp paths (writable in OpenShift)
        client_body_temp_path /tmp/nginx-client-body;
        proxy_temp_path /tmp/nginx-proxy;
        fastcgi_temp_path /tmp/nginx-fastcgi;
        uwsgi_temp_path /tmp/nginx-uwsgi;
        scgi_temp_path /tmp/nginx-scgi;

        upstream api {
            server {{ include "ambient-provider.fullname" . }}-api:{{ .Values.service.api.port }};
        }

        upstream ui {
            server {{ include "ambient-provider.fullname" . }}-ui:{{ .Values.service.ui.port }};
        }

        server {
            listen 8080;
            server_name _;

            # API proxy (long timeouts + no buffering for SSE /api/notes/stream)
            location /api/ {
                proxy_pass http://api/api/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 3600s;
                proxy_connect_timeout 60s;
                proxy_send_timeout 3600s;
                proxy_buffering off;
                proxy_cache off;
            }

            # UI proxy
            location / {
                proxy_pass http://ui/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ambient-provider.fullname" . }}-ui-nginx-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ambient-provider.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

        access_log /dev/stdout main;

        sendfile on;
        tcp_nopush on;
        keepalive_timeout 65;
        gzip on;

        # Use /tmp for all temp paths (writable in OpenShift)
        client_body_temp_path /tmp/nginx-client-body;
        proxy_temp_path /tmp/nginx-proxy;
        fastcgi_temp_path /tmp/nginx-fastcgi;
        uwsgi_temp_path /tmp/nginx-uwsgi;
        scgi_temp_path /tmp/nginx-scgi;

        upstream api {
            server {{ include "ambient-provider.fullname" . }}-api:{{ .Values.service.api.port }};
        }

        server {
            listen 8080;
            server_name _;
            root /usr/share/nginx/html;
            index index.html;

            # API proxy (long timeouts + no buffering for SSE /api/notes/stream)
            location /api/ {
                proxy_pass http://api/api/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 3600s;
                proxy_connect_timeout 60s;
                proxy_send_timeout 3600s;
                proxy_buffering off;
                proxy_cache off;
            }

            # Serve static files
            location / {
                try_files $uri $uri/ /index.html;
            }
        }
    }
