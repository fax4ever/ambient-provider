apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ambient-provider.fullname" . }}-ui
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ambient-provider.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.replicaCount.ui }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ambient-provider.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ambient-provider.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: ui
    spec:
      containers:
      - name: ui
        image: {{ include "ambient-provider.uiImage" . }}
        imagePullPolicy: {{ .Values.images.ui.pullPolicy | default .Values.images.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.ui.port }}
          protocol: TCP
        env:
        - name: VITE_API_BASE
          value: "/api"
        - name: VITE_API_PROXY_TARGET
          value: "http://{{ include "ambient-provider.fullname" . }}-api:{{ .Values.service.api.port }}"
        - name: VITE_USE_STREAMING
          value: {{ .Values.ui.viteUseStreaming | quote }}
        volumeMounts:
        - name: vite-cache
          mountPath: /app/node_modules/.vite
        resources:
          {{- toYaml .Values.resources.ui | nindent 10 }}
      volumes:
      - name: vite-cache
        emptyDir: {}
