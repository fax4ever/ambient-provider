apiVersion: apps.nvidia.com/v1alpha1
kind: NIMService
metadata:
  name: llama-nim
  namespace: nvidia-nim
spec:
  authSecret: ngc-api-secret

  image:
    repository: nvcr.io/nim/meta/llama-3.1-8b-instruct
    tag: latest
    pullPolicy: IfNotPresent

  imagePullSecrets:
    - name: ngc-secret

  # Resource requirements - Llama 8B with reduced resources
  resources:
    limits:
      nvidia.com/gpu: 1
      memory: 32Gi
    requests:
      nvidia.com/gpu: 1
      memory: 16Gi

  # Environment variables
  env:
    - name: NGC_API_KEY
      valueFrom:
        secretKeyRef:
          name: ngc-api-secret
          key: NGC_API_KEY
    - name: NIM_HTTP_API_PORT
      value: "8000"

  # Expose service
  expose:
    service:
      type: ClusterIP
      ports:
        - name: http
          port: 8000
          targetPort: 8000
          protocol: TCP

  # Storage for model cache - reference pre-created PVC
  storage:
    pvc:
      create: false
      name: llama-nim-pvc

  # Tolerations for GPU nodes
  tolerations:
    - key: "g5-gpu"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"
